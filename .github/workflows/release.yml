name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Set plugin version
        run: sed -i "s/^pluginVersion=.*/pluginVersion=${{ steps.version.outputs.VERSION }}/" gradle.properties

      - name: Build plugin
        run: ./gradlew buildPlugin --no-daemon

      - name: Locate plugin zip
        id: artifact
        run: |
          ZIP=$(find build/distributions -name "*.zip" | head -1)
          echo "PATH=$ZIP" >> "$GITHUB_OUTPUT"
          echo "NAME=$(basename $ZIP)" >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Claude Code Sessions ${{ github.ref_name }}
          body: |
            ## Installation

            1. Download `${{ steps.artifact.outputs.NAME }}` below
            2. In JetBrains IDE: **Settings → Plugins → ⚙️ → Install Plugin from Disk...**
            3. Select the downloaded `.zip` file and restart the IDE

            ---
            *Or install directly from the [JetBrains Marketplace](https://plugins.jetbrains.com/plugin/com.coding9.claude-code-sessions) once published.*
          files: ${{ steps.artifact.outputs.PATH }}
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
